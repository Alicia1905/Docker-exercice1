events {}

http {

    server {
        listen 80;

        # USERS
        location /api/users/ {
            rewrite ^/api/users/(.*)$ /users/$1 break;
            proxy_pass http://users-service:5001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # PRODUCTS
        location /api/products/ {
            rewrite ^/api/products/(.*)$ /products/$1 break;
            proxy_pass http://products-service:5002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ORDERS
        location /api/orders/ {
            rewrite ^/api/orders/(.*)$ /orders/$1 break;
            proxy_pass http://orders-service:5003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

    }

}