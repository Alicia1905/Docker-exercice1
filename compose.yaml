version: "3.9"

services:

  products-db:
    image: postgres:15-alpine
    container_name: products-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${PRODUCTS_DB_NAME}
      POSTGRES_USER: ${PRODUCTS_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCTS_DB_PASSWORD}
    volumes:
      - products_db_data:/var/lib/postgresql/data
      - ./services/products/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PRODUCTS_DB_USER} -d ${PRODUCTS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - products-network

  products-service:
    build: ./services/products
    container_name: products-service
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: products-db
      DB_PORT: 5432
      DB_NAME: ${PRODUCTS_DB_NAME}
      DB_USER: ${PRODUCTS_DB_USER}
      DB_PASSWORD: ${PRODUCTS_DB_PASSWORD}
    depends_on:
      products-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - products-network
      - api-network

  orders-db:
    image: postgres:15-alpine
    container_name: orders-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${ORDERS_DB_NAME}
      POSTGRES_USER: ${ORDERS_DB_USER}
      POSTGRES_PASSWORD: ${ORDERS_DB_PASSWORD}
    volumes:
      - orders_db_data:/var/lib/postgresql/data
      - ./services/orders/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ORDERS_DB_USER} -d ${ORDERS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orders-network

  orders-service:
    build: ./services/orders
    container_name: orders-service
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: orders-db
      DB_PORT: 5432
      DB_NAME: ${ORDERS_DB_NAME}
      DB_USER: ${ORDERS_DB_USER}
      DB_PASSWORD: ${ORDERS_DB_PASSWORD}
      PRODUCTS_SERVICE_URL: http://products-service:5002
    depends_on:
      orders-db:
        condition: service_healthy
      products-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - orders-network
      - api-network

  users-db:
    image: postgres:15-alpine
    container_name: users-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB_USERS}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - users_db_data:/var/lib/postgresql/data
      - ./services/users/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB_USERS}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - users-network

  users-service:
    build: ./services/users
    container_name: users-service
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: users-db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB_USERS}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      users-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - users-network
      - api-network

  gateway:
    image: nginx:alpine
    container_name: gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      users-service:
        condition: service_healthy
      products-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
    networks:
      - api-network

volumes:
  products_db_data:
  orders_db_data:
  users_db_data:

networks:
  products-network:
  orders-network:
  users-network:
  api-network: