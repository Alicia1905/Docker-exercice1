version: "3.9"

services:

  users-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_USERS}
    volumes:
      - users-db-data:/var/lib/postgresql/data
      - ./services/users/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - users-network
    healthcheck:
      test: ["CMD","pg_isready","-U","postgres"]
      interval: 5s
      retries: 5

  users-service:
    build: ./services/users
    restart: unless-stopped
    environment:
      DB_HOST: users-db
      DB_NAME: ${POSTGRES_DB_USERS}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
    depends_on:
      users-db:
        condition: service_healthy
    networks:
      - users-network
      - api-network

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf
    networks:
      - api-network
    depends_on:
      - users-service

volumes:
  users-db-data:

networks:
  users-network:
  api-network: